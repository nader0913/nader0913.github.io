<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .error-container {
      text-align: center;
      padding: 3em;
      max-width: 600px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 5em;
      margin: 0;
      color: #333;
    }
    p {
      font-size: 1.2em;
      color: #666;
      margin: 1em 0;
    }
    a {
      display: inline-block;
      margin-top: 1em;
      padding: 0.8em 2em;
      background: #2c5aa0;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
    }
    a:hover {
      background: #234a8a;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">Go to homepage</a>
  </div>
</body>
</html>
